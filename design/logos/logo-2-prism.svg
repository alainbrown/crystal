<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Crystal — prism refracting light">
  <defs>
    <linearGradient id="p2-tile" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#21253A"/>
      <stop offset="1" stop-color="#161A28"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="30" fill="url(#p2-tile)"/>
  <!-- incoming white beam -->
  <path d="M14 60 L52 60" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- refracted spectrum fanning out from the right face -->
  <g stroke-width="3.5" stroke-linecap="round">
    <path d="M78 66 L120 58" stroke="#A78BFF"/>
    <path d="M78 66 L120 70" stroke="#7C8BFF"/>
    <path d="M78 66 L120 82" stroke="#56C8F0"/>
    <path d="M78 66 L120 94" stroke="#5CE0C8"/>
  </g>
  <!-- the prism: equilateral triangle, two-tone faces -->
  <g stroke="#EEF0FF" stroke-width="2.5" stroke-linejoin="round">
    <polygon points="64,30 64,96 36,96" fill="#7E85FF"/>   <!-- left face (lit) -->
    <polygon points="64,30 92,96 64,96" fill="#5158D6"/>   <!-- right face (shadow) -->
  </g>
  <polygon points="64,30 92,96 36,96" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
