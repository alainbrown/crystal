name: Release

# Chains off a successful CI run on main — no test rerun, no rebuild.
# Only cuts a release when package.json's version has no matching tag yet,
# reusing the extension build that CI already produced.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already released
        id: check
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.version }} already tagged — nothing to release."
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download built extension from CI
        if: steps.check.outputs.new == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package extension
        if: steps.check.outputs.new == 'true'
        run: |
          cd dist
          zip -r "../crystal-v${{ steps.ver.outputs.version }}.zip" .

      - name: Create GitHub release
        if: steps.check.outputs.new == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          files: crystal-v${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
