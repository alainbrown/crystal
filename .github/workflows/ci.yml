name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Runs the whole suite (unit + the real-WebGPU e2e journey via `pnpm test`).
  # macos-14 is the only free runner where Chromium's Metal-via-ANGLE WebGPU
  # path actually works — Ubuntu + software Vulkan (lavapipe) is far too slow
  # for transformer inference and times out.
  test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + e2e)
        run: pnpm test

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 14

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
